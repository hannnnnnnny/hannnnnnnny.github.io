    <rect x="470" y="452" width="48" height="76" rx="4" opacity="0.45"/>
    <rect x="546" y="372" width="48" height="156" rx="4" opacity="0.75"/>
    <rect x="622" y="416" width="48" height="112" rx="4" opacity="0.55"/>
