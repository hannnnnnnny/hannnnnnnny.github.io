<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <rect width="1280" height="800" fill="#0a0e13"/>
  <!-- sidebar -->
  <rect x="0" y="0" width="232" height="800" fill="#0d141b"/>
