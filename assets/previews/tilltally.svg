    <text x="294" y="204" fill="#f4f7fb" font-size="32" font-weight="800">$48,210</text>
    <text x="294" y="230" fill="#7ee7d6" font-size="13">&#9650; 12% vs last week</text>

    <rect x="518" y="130" width="230" height="116" rx="12" fill="#10151b" stroke="#24313b"/>
