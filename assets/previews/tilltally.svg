    <text x="540" y="230" fill="#7dd3fc" font-size="13">Healthy range</text>

    <rect x="764" y="130" width="230" height="116" rx="12" fill="#10151b" stroke="#24313b"/>
    <text x="786" y="164" fill="#748491" font-size="12" letter-spacing="1">ORDERS</text>
