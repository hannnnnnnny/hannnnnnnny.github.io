  <line x1="296" y1="664" x2="1220" y2="664" stroke="#24313b"/>
  <g font-size="14" fill="#dce5ec">
    <text x="296" y="692">Women's Jacket A</text><text x="700" y="692">24</text><text x="800" y="692" fill="#7ee7d6">58%</text>
    <rect x="940" y="678" width="96" height="22" rx="11" fill="#f48fb1" opacity="0.16"/><text x="954" y="693" fill="#f48fb1" font-size="12">Reorder</text>
    <text x="296" y="724">Homeware Mug Set</text><text x="700" y="724">61</text><text x="800" y="724" fill="#7ee7d6">55%</text>
    <rect x="940" y="710" width="104" height="22" rx="11" fill="#7ee7d6" opacity="0.16"/><text x="954" y="725" fill="#7ee7d6" font-size="12">Best seller</text>
    <text x="296" y="756">Vintage Lamp</text><text x="700" y="756">2</text><text x="800" y="756" fill="#9aa7b1">31%</text>
    <rect x="940" y="742" width="110" height="22" rx="11" fill="#f2c879" opacity="0.16"/><text x="954" y="757" fill="#f2c879" font-size="12">Slow mover</text>
