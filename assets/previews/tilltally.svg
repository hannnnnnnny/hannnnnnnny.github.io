  <text x="918" y="308" fill="#f4f7fb" font-size="17" font-weight="700">Channel mix</text>
  <g transform="translate(1006,420)" fill="none" stroke-width="30">
    <circle r="74" stroke="#1b2530"/>
    <circle r="74" stroke="#7ee7d6" stroke-dasharray="232 465" transform="rotate(-90)"/>
    <circle r="74" stroke="#7dd3fc" stroke-dasharray="130 465" stroke-dashoffset="-232" transform="rotate(-90)"/>
    <circle r="74" stroke="#f48fb1" stroke-dasharray="103 465" stroke-dashoffset="-362" transform="rotate(-90)"/>
  </g>
  <g font-size="14">
    <rect x="1118" y="372" width="11" height="11" rx="3" fill="#7ee7d6"/><text x="1138" y="382" fill="#9aa7b1">Shopify 50%</text>
    <rect x="1118" y="406" width="11" height="11" rx="3" fill="#7dd3fc"/><text x="1138" y="416" fill="#9aa7b1">Trade Me 28%</text>
    <rect x="1118" y="440" width="11" height="11" rx="3" fill="#f48fb1"/><text x="1138" y="450" fill="#9aa7b1">In-store 22%</text>
  </g>

